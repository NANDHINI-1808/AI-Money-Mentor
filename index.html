<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Money Mentor</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#eef2ff,#fdf2f8);
}

/* Glass card */
.card{
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(12px);
  border-radius:16px;
  padding:20px;
  box-shadow:0 8px 32px rgba(0,0,0,0.1);
  transition:0.3s;
}
.card:hover{ transform:translateY(-3px); }

/* Button */
.btn{
  background:linear-gradient(135deg,#6366f1,#ec4899);
  color:#fff;
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}
.btn-secondary{
  background:#e5e7eb;
  color:#000;
}

/* Input */
input{
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  width:100%;
}

/* Navbar */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.nav-links{
  display:flex;
  gap:20px;
}
.nav-links div{
  cursor:pointer;
}
.active{
  color:#6366f1;
  font-weight:600;
}

/* Chat bubble */
.user{
  text-align:right;
  color:white;
  background:#6366f1;
  padding:8px 12px;
  border-radius:10px;
  margin:5px 0;
  display:inline-block;
}
.bot{
  text-align:left;
  background:#e5e7eb;
  padding:8px 12px;
  border-radius:10px;
  margin:5px 0;
  display:inline-block;
}

/* Modal */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<div id="app"></div>

<!-- Logout Modal -->
<div id="logoutModal" class="modal">
  <div class="card text-center w-80">
    <h2 class="text-xl font-bold mb-3">⚠ Confirm Logout</h2>
    <p class="mb-4">Are you sure you want to logout?</p>
    <button class="btn mr-2" onclick="confirmLogout()">Yes</button>
    <button class="btn btn-secondary" onclick="closeModal()">No</button>
  </div>
</div>

<script>

let state={
  page:'login',
  user:null,
  chat:[]
};

function render(){
  const app=document.getElementById('app');

  if(state.page==='login'){
    app.innerHTML=`
    <div class="flex justify-center items-center h-screen">
      <div class="card w-80 text-center">
        <h2 class="text-2xl font-bold mb-4">💰 AI Money Mentor</h2>
        <input id="email" placeholder="Email"><br><br>
        <input id="pass" type="password" placeholder="Password"><br><br>
        <button class="btn w-full" onclick="login()">Login</button>
      </div>
    </div>`;
  }

  else{
    app.innerHTML=`
    <div class="p-6">

      <div class="nav">
        <h2 class="text-xl font-bold">💰 AI Money Mentor</h2>
        <div class="nav-links">
          <div onclick="nav('dashboard')" class="${state.page==='dashboard'?'active':''}">Dashboard</div>
          <div onclick="nav('chat')" class="${state.page==='chat'?'active':''}">AI Chat</div>
          <div onclick="nav('invest')" class="${state.page==='invest'?'active':''}">Invest</div>
          <div onclick="logout()">Logout</div>
        </div>
      </div>

      ${state.page==='dashboard'?dashboard():''}
      ${state.page==='chat'?chat():''}
      ${state.page==='invest'?invest():''}

    </div>`;
  }
}

function login(){
  state.user={name:"User"};
  state.page='dashboard';
  render();
}

function logout(){
  document.getElementById('logoutModal').style.display='flex';
}

function closeModal(){
  document.getElementById('logoutModal').style.display='none';
}

function confirmLogout(){
  state.user=null;
  state.page='login';
  closeModal();
  render();
}

function nav(p){
  state.page=p;
  render();
}

function dashboard(){
  return `
  <div class="grid md:grid-cols-3 gap-6">
    <div class="card">
      <h3 class="text-gray-500">Balance</h3>
      <p class="text-2xl font-bold">₹45,230</p>
    </div>
    <div class="card">
      <h3 class="text-gray-500">Income</h3>
      <p class="text-2xl font-bold text-green-500">₹8,500</p>
    </div>
    <div class="card">
      <h3 class="text-gray-500">Expenses</h3>
      <p class="text-2xl font-bold text-red-500">₹3,200</p>
    </div>
  </div>`;
}

function chat(){
  return `
  <div class="card">
    <h2 class="text-xl font-bold mb-3">💬 AI Chat</h2>

    <div id="chatBox" class="mb-4">
      ${state.chat.map(m=>`
        <div class="${m.role==='You'?'user':'bot'}">${m.text}</div>
      `).join('')}
    </div>

    <input id="msg" placeholder="Ask about finance..."><br><br>
    <button class="btn" onclick="send()">Send</button>
  </div>`;
}

function send(){
  let msg=document.getElementById('msg').value;
  if(!msg) return;

  state.chat.push({role:'You',text:msg});
  state.chat.push({role:'AI',text:'💡 Suggestion: Save more and invest wisely!'});

  render();
}

function invest(){
  return `
  <div class="grid md:grid-cols-2 gap-6">

    <div class="card">
      <h2 class="text-xl font-bold mb-3">📊 Investment Plan</h2>
      <p>Monthly SIP: ₹5000</p>
      <p>Expected Return: 10%</p>
    </div>

    <div class="card">
      <h2 class="text-xl font-bold mb-3">📈 Portfolio</h2>
      <p>Equity: 50%</p>
      <p>Debt: 30%</p>
      <p>Gold: 20%</p>
    </div>

  </div>`;
}

render();

</script>

</body>
</html>
